acceptance_criteria:
  - id: AC-01
    description: /handoff route exists and is reachable from the home page.
  - id: AC-02
    description: Handoff data is loaded through lib/db/handoff.ts.
  - id: AC-03
    description: The page renders a copyable markdown-style handoff summary.
  - id: AC-04
    description: The handoff summarizes product identity, spec state, tasks, dogfooding, decisions, releases, and dashboard availability.
  - id: AC-05
    description: Missing-product and database-error states are handled gracefully.
  - id: AC-06
    description: The feature is read-only and does not add AI generation, persistence, create, edit, delete, GitHub import, release automation, deployment, schema, or dependency changes.
  - id: AC-07
    description: The route is dynamic if Prisma runtime reads are used.
  - id: AC-08
    description: README, architecture, MVP scope, and dogfooding docs are updated.
  - id: AC-09
    description: pnpm verify passes.
  - id: AC-10
    description: Planner, Builder, Tester, and Reviewer artifacts are created before PR.
required_checks:
  - verify
