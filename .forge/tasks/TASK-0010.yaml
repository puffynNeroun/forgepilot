schema_version: 1
id: TASK-0010
title: Add handoff summary MVP
status: in_progress
workflow: .forge/workflows/feature.yaml
goal: Add a read-only handoff summary MVP that turns current ForgePilot product state into a copyable AI handoff without using AI or adding persistence.
in_scope:
  - Add a dynamic /handoff route for the demo ForgePilot product.
  - Add a narrow Prisma data access layer for handoff summary data.
  - Summarize product identity, spec state, task counts, dogfooding counts, decisions, releases, and dashboard availability.
  - Render a copyable markdown-style handoff block.
  - Link /handoff from the home page.
  - Render graceful database-error and missing-product states.
  - Update README, architecture, MVP scope, and dogfooding documentation.
  - Keep verification green.
out_of_scope:
  - AI-generated summaries.
  - Saving handoff snapshots to the database.
  - Creating, editing, or deleting handoff snapshots.
  - GitHub import.
  - Release automation.
  - Deployment.
  - Auth, teams, billing, or permissions.
  - Prisma schema changes.
  - Dependency changes.
  - Replacing the existing dashboard or detail pages.
