schema_version: 1

id: TASK-0001
title: "Define ForgePilot product spec and architecture"
status: in_progress
workflow: .forge/workflows/feature.yaml

goal: "Define ForgePilot's product specification, MVP scope, architecture direction, task roadmap, and dogfooding policy before application bootstrap begins."

in_scope:
  - Refine the ForgePilot product problem, target user, value proposition, MVP scope, non-goals, success criteria, stack, and risks.
  - Refine the architecture direction for the future Next.js App Router application.
  - Define the initial module boundaries and data model direction.
  - Confirm the v0.1.0 task roadmap at documentation level.
  - Record dogfooding findings discovered while bootstrapping and planning ForgePilot.
  - Keep the work documentation-only; do not implement application runtime code.
  - Preserve Forge contract validation behavior for ForgePilot as a consumer project.

out_of_scope:
  - Creating the Next.js application.
  - Installing Next.js, React, Tailwind, Prisma, Zod, or database dependencies.
  - Creating Prisma schema or database migration files.
  - Implementing UI, API routes, server actions, or application runtime logic.
  - Adding authentication, billing, teams, OAuth, GitHub import automation, or AI agent execution.
  - Creating GitHub remote repositories.
  - Automatically creating branches, commits, pushes, pull requests, merges, releases, or deployments.
  - Modifying completed task contracts or completed task artifacts.
  - Rewriting previous task evidence.
  - Adding unrelated features outside TASK-0001.

allowed_files:
  - .forge/tasks/TASK-0001.yaml
  - docs/TASKS.md
  - docs/PRODUCT_SPEC.md
  - docs/ARCHITECTURE.md
  - docs/MVP_SCOPE.md
  - docs/DECISIONS.md
  - docs/DOGFOODING_LOG.md
  - README.md
  - .forge/artifacts/TASK-0001/plan-001.md
  - .forge/artifacts/TASK-0001/build-report-001.md
  - .forge/artifacts/TASK-0001/test-report-001.md
  - .forge/artifacts/TASK-0001/review-report-001.md

protected_files:
  - .github/workflows/forge-contracts.yml
  - .forge/workflows/feature.yaml
  - .forge/roles/planner.md
  - .forge/roles/builder.md
  - .forge/roles/tester.md
  - .forge/roles/reviewer.md
  - tools/forge-validator/
  - scripts/operator/
  - completed task contracts and artifacts

acceptance_criteria:
  - id: AC-01
    description: ForgePilot's product specification is clear enough to guide implementation tasks.
  - id: AC-02
    description: The MVP scope and non-goals are explicit enough to prevent early SaaS overbuilding.
  - id: AC-03
    description: The architecture direction defines the planned application shape, core modules, and data model direction.
  - id: AC-04
    description: The initial task roadmap from TASK-0002 through v0.1.0 release is documented or confirmed.
  - id: AC-05
    description: Dogfooding findings from ForgePilot bootstrap and planning are recorded.
  - id: AC-06
    description: Forge contract validation passes for the consumer project workflow.
  - id: AC-07
    description: The task lifecycle artifacts are created and linked correctly.

required_checks:
  - verify
