acceptance_criteria:
  - id: AC-01
    description: /releases route exists and is reachable from the home page.
  - id: AC-02
    description: Releases are loaded through lib/db/releases.ts.
  - id: AC-03
    description: UI renders release timeline/cards with name/version/title, status, notes/summary, date fields, and timestamps where available.
  - id: AC-04
    description: Missing-product, empty-list, and database-error states are handled gracefully.
  - id: AC-05
    description: The feature is read-only and does not add create, edit, delete, release publishing, tags, deployment, AI, GitHub import, or dashboard expansion.
  - id: AC-06
    description: The route is dynamic if Prisma runtime reads are used.
  - id: AC-07
    description: README and architecture/MVP docs are updated.
  - id: AC-08
    description: Dogfooding friction from this task is recorded when relevant.
  - id: AC-09
    description: pnpm verify passes.
  - id: AC-10
    description: Planner, Builder, Tester, and Reviewer artifacts are created before PR.
required_checks:
  - verify
