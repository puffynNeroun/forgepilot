  - .forge/tasks/TASK-0006.yaml
  - .forge/tasks/TASK-0007.yaml
  - .forge/artifacts/TASK-0001/
  - .forge/artifacts/TASK-0002/
  - .forge/artifacts/TASK-0003/
  - .forge/artifacts/TASK-0004/
