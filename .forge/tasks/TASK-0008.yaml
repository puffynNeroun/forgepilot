schema_version: 1
id: TASK-0008
title: Add release timeline MVP
status: approved
workflow: .forge/workflows/feature.yaml
goal: Add a read-only release timeline MVP page that surfaces ForgePilot product releases from the existing ProductRelease model.
in_scope:
  - Add a dynamic /releases route for the demo ForgePilot product.
  - Load releases through a narrow Prisma data access layer.
  - Render release cards or timeline entries with name/version/title, status, notes/summary, date fields, and timestamps where available.
  - Add graceful database, missing-product, and empty-state UI.
  - Link /releases from the home page.
  - Update README, architecture, MVP scope, and dogfooding documentation.
  - Keep verification green.
out_of_scope:
  - Creating releases from the UI.
  - Editing releases from the UI.
  - Deleting releases from the UI.
  - Publishing a real GitHub release.
  - Creating git tags.
  - Deployment.
  - AI summarization.
  - GitHub import.
  - Full dashboard composition.
  - Handoff generator.
  - Auth, teams, billing, or release automation.
  - Prisma schema changes.
  - Dependency changes.
allowed_files:
  - .forge/tasks/TASK-0008.yaml
  - .forge/artifacts/TASK-0008/
  - docs/TASKS.md
  - docs/DOGFOODING_LOG.md
  - docs/ARCHITECTURE.md
  - docs/MVP_SCOPE.md
  - README.md
  - app/page.tsx
  - app/releases/
