acceptance_criteria:
  - id: AC-01
    description: A product spec editor page exists and is reachable from the app.
  - id: AC-02
    description: The editor can display the current/demo ForgePilot product spec.
  - id: AC-03
    description: The editor supports editing and saving spec title/content.
  - id: AC-04
    description: Server-side persistence uses the existing Prisma foundation safely.
  - id: AC-05
    description: Validation prevents empty or invalid spec title/content.
  - id: AC-06
    description: The page has basic loading/empty/error states or equivalent graceful handling.
  - id: AC-07
    description: The implementation does not add auth, teams, billing, AI generation, dashboard, task board, decision log, release timeline, or handoff generator features.
  - id: AC-08
    description: pnpm verify passes.
  - id: AC-09
    description: Relevant documentation is updated.
  - id: AC-10
    description: Any Forge/Next/Prisma friction is recorded in docs/DOGFOODING_LOG.md.
  - id: AC-11
    description: Planner, Builder, Tester, and Reviewer artifacts are created and linked correctly.

required_checks:
  - verify
