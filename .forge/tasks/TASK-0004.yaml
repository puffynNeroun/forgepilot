schema_version: 1

id: TASK-0004
title: "Implement product spec editor"
status: completed
workflow: .forge/workflows/feature.yaml

goal: "Implement the first ForgePilot product spec editor feature using the existing Next.js app shell and Prisma persistence foundation, while keeping the scope focused on editing and saving a product specification."

in_scope:
  - Add a product spec editor route/page to the existing Next.js app.
  - Load the active/demo ForgePilot product spec from the database where practical.
  - Provide a simple editable form for product spec title/content.
  - Save product spec updates through a server-side action or route handler.
  - Add minimal validation for spec title/content.
  - Add a graceful empty/loading/error state.
  - Keep the implementation suitable for local demo usage.
  - Add a small data access layer for product spec reads/writes if useful.
  - Update navigation/homepage links so the spec editor is reachable.
  - Update README or docs with how to run the editor locally.
  - Keep pnpm verify green.
  - Record any Forge/Next/Prisma friction in docs/DOGFOODING_LOG.md.

out_of_scope:
  - Full dashboard implementation.
  - Task lifecycle board UI.
  - Decision log UI.
  - Dogfooding log UI.
  - Release timeline UI.
  - Handoff prompt generator UI.
  - Multi-product management UI.
  - Authentication.
  - Teams, billing, OAuth, or SaaS account management.
  - Rich collaborative editing.
  - AI generation of specs.
  - GitHub import automation.
  - Production deployment.
  - Database migrations beyond what is necessary for the existing schema.
  - Creating a release.
  - Modifying completed TASK-0001, TASK-0002, or TASK-0003 artifacts.
  - Rewriting previous Git history.

