schema_version: 1
id: TASK-0007
title: Add decision log MVP
status: completed
workflow: .forge/workflows/feature.yaml
goal: Add a read-only decision log MVP page that surfaces ForgePilot product and architecture decisions from the existing Decision model.
in_scope:
  - Add a dynamic /decisions route for the demo ForgePilot product.
  - Load decisions through a narrow Prisma data access layer.
  - Render decision cards with title, summary/content, status/type/category, rationale, and timestamps where available.
  - Add graceful database, missing-product, and empty-state UI.
  - Link /decisions from the home page.
  - Update README, architecture, MVP scope, and dogfooding documentation.
  - Keep verification green.
out_of_scope:
  - Creating decisions from the UI.
  - Editing decisions from the UI.
  - Deleting decisions from the UI.
  - AI summarization.
  - GitHub import.
  - Full dashboard composition.
  - Release timeline.
  - Handoff generator.
  - Auth, teams, billing, deployment, or release.
  - Prisma schema changes.
  - Dependency changes.
allowed_files:
  - .forge/tasks/TASK-0007.yaml
  - .forge/artifacts/TASK-0007/
  - docs/TASKS.md
  - docs/DOGFOODING_LOG.md
  - docs/ARCHITECTURE.md
  - docs/MVP_SCOPE.md
  - README.md
  - app/page.tsx
