schema_version: 1
id: TASK-0006
title: Add dogfooding log MVP
status: approved
workflow: .forge/workflows/feature.yaml
goal: Add a read-only dogfooding log MVP page that surfaces ForgePilot/Project Forge workflow friction, resolutions, and potential Forge improvements.
in_scope:
  - Add a dynamic /dogfooding route for the demo ForgePilot product.
  - Load dogfooding entries through a narrow Prisma data access layer.
  - Render dogfooding findings with severity, title, observation, resolution, and improvement fields where available.
  - Add graceful database, missing-product, and empty-state UI.
  - Link /dogfooding from the home page.
  - Update README, architecture, MVP scope, and dogfooding documentation.
  - Keep verification green.
out_of_scope:
  - Creating dogfooding entries from the UI.
  - Editing dogfooding entries from the UI.
  - Deleting dogfooding entries from the UI.
  - AI summarization.
  - GitHub import.
  - Full dashboard composition.
  - Release timeline.
  - Handoff generator.
  - Auth, teams, billing, deployment, or release.
allowed_files:
  - .forge/tasks/TASK-0006.yaml
  - .forge/artifacts/TASK-0006/
  - docs/TASKS.md
  - docs/DOGFOODING_LOG.md
  - docs/ARCHITECTURE.md
  - docs/MVP_SCOPE.md
  - README.md
  - app/page.tsx
  - app/dogfooding/
  - app/dogfooding/page.tsx
  - app/dogfooding/loading.tsx
  - components/dogfooding/
  - components/dogfooding/DogfoodingLog.tsx
  - components/dogfooding/DogfoodingSeverityBadge.tsx
  - lib/db/
  - lib/db/dogfooding.ts
protected_files:
  - .forge/tasks/TASK-0001.yaml
  - .forge/tasks/TASK-0002.yaml
  - .forge/tasks/TASK-0003.yaml
  - .forge/tasks/TASK-0004.yaml
  - .forge/tasks/TASK-0005.yaml
  - .forge/artifacts/TASK-0001/
  - .forge/artifacts/TASK-0002/
  - .forge/artifacts/TASK-0003/
  - .forge/artifacts/TASK-0004/
  - .forge/artifacts/TASK-0005/
  - prisma/schema.prisma
  - docker-compose.yml
  - package.json
  - pnpm-lock.yaml
  - tools/forge-validator/
acceptance_criteria:
  - id: AC-01
    description: /dogfooding route exists and is reachable from the home page.
  - id: AC-02
    description: Dogfooding entries are loaded through lib/db/dogfooding.ts.
  - id: AC-03
    description: UI renders dogfooding findings with severity, title, observation, resolution, and potential Forge improvement where available.
  - id: AC-04
    description: Missing-product, empty-list, and database-error states are handled gracefully.
  - id: AC-05
    description: The feature is read-only and does not add create, edit, delete, AI, GitHub import, or dashboard expansion.
  - id: AC-06
    description: The route is dynamic if Prisma runtime reads are used.
  - id: AC-07
    description: README and architecture/MVP docs are updated.
  - id: AC-08
    description: Dogfooding friction from this task is recorded when relevant.
  - id: AC-09
    description: pnpm verify passes.
  - id: AC-10
    description: Planner, Builder, Tester, and Reviewer artifacts are created before PR.
required_checks:
  - verify
