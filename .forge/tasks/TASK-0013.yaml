acceptance_criteria:
  - id: AC-01
    description: "When GitHub initially reports no checks but check rows appear within the bounded grace period, forge pr watch retries registration and then continues into the normal checks watch."
  - id: AC-02
    description: "When no checks appear before the grace period expires, the command terminates without hanging, reports a persistent missing-checks state, and does not invoke the blocking watch."
  - id: AC-03
    description: "Authentication, network, malformed JSON, and other non-registration failures remain unavailable errors and are not incorrectly retried as delayed registration."
  - id: AC-04
    description: "Passing, failing, pending, skipped, and unknown final check classifications preserve their existing fail-closed behavior."
  - id: AC-05
    description: "The report exposes enough registration diagnostics to show whether checks were immediate, delayed, or still missing after the configured attempts."
  - id: AC-06
    description: "PR status recommendations use forge pr watch for pending or unavailable checks, and the compatibility operator watcher delegates to the hardened Forge command."
  - id: AC-07
    description: "The implementation remains read-only and performs no Git, GitHub, task, artifact, PR, merge, or filesystem mutation."
  - id: AC-08
    description: "Focused unit tests cover immediate registration, delayed registration, persistent absence, passing, failing, pending, malformed output, and real GitHub CLI errors."
  - id: AC-09
    description: "Forge contract validation and the repository verification required by the task continue to pass."

required_checks:
  - verify
