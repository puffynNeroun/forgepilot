schema_version: 1

id: TASK-0013
title: "Harden PR checks watch for delayed GitHub check registration"
status: approved
workflow: .forge/workflows/feature.yaml

goal: "Make Forge PR check watching tolerate GitHub's short check-registration delay without hiding persistent missing checks, real GitHub CLI failures, or failed CI."

in_scope:
  - Add a bounded check-registration grace period before starting the blocking PR checks watch.
  - Retry only the transient GitHub CLI no-checks-reported condition while waiting for the first check rows.
  - Distinguish delayed registration, persistent missing checks, pending checks, failed checks, passing checks, and unavailable check data.
  - Keep retry timing injectable so unit tests run deterministically without real sleeping.
  - Preserve the existing read-only forge pr watch command and its exit-code contract.
  - Update PR status recommendations to prefer the hardened Forge watch command for pending or unavailable check data.
  - Route the legacy operator watch helper through the hardened Forge command.
  - Add focused automated tests for immediate, delayed, missing, pending, passing, failing, and unavailable scenarios.
  - Record the delayed GitHub check-registration friction and any separately discovered deferred Forge issue in the dogfooding log.

out_of_scope:
  - Creating, pushing, merging, closing, or deleting pull requests or branches.
  - Automatically merging after checks pass.
  - Changing GitHub Actions workflows, branch protection, or required-check policy.
  - Adding a background daemon, scheduler, webhook listener, or persistent watcher state.
  - Adding AI analysis or external services.
  - Modifying completed TASK-0001 through TASK-0012 contracts or artifacts.
  - Fixing unrelated validator test-runner defects unless a separate task explicitly approves that work.
  - Releasing or deploying ForgePilot.

