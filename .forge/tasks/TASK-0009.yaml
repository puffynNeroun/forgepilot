acceptance_criteria:
  - id: AC-01
    description: /dashboard route exists and is reachable from the home page.
  - id: AC-02
    description: Dashboard data is loaded through lib/db/dashboard.ts.
  - id: AC-03
    description: Dashboard summarizes product spec, tasks, dogfooding entries, decisions, and releases using read-only data.
  - id: AC-04
    description: Missing-product and database-error states are handled gracefully.
  - id: AC-05
    description: The dashboard links to the existing product surfaces.
  - id: AC-06
    description: The feature is read-only and does not add create, edit, delete, AI, GitHub import, release automation, handoff generation, auth, teams, billing, deployment, schema, or dependency changes.
  - id: AC-07
    description: The route is dynamic if Prisma runtime reads are used.
  - id: AC-08
    description: README, architecture, MVP scope, and dogfooding docs are updated.
  - id: AC-09
    description: pnpm verify passes.
  - id: AC-10
    description: Planner, Builder, Tester, and Reviewer artifacts are created before PR.
required_checks:
  - verify
