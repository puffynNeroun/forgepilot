schema_version: 1
id: TASK-0009
title: Add dashboard overview MVP
status: in_progress
workflow: .forge/workflows/feature.yaml
goal: Add a read-only dashboard overview MVP that summarizes the existing ForgePilot product surfaces without adding new business workflows.
in_scope:
  - Add a dynamic /dashboard route for the demo ForgePilot product.
  - Add a narrow Prisma data access layer for dashboard summary counts.
  - Summarize product spec, tasks, dogfooding entries, decisions, and releases.
  - Link /dashboard from the home page.
  - Render graceful database-error and missing-product states.
  - Update README, architecture, MVP scope, and dogfooding documentation.
  - Keep verification green.
out_of_scope:
  - Editing product data from the dashboard.
  - Creating tasks, decisions, releases, dogfooding entries, or specs from the dashboard.
  - AI summarization.
  - GitHub import.
  - Release automation.
  - Handoff generator.
  - Auth, teams, billing, or permissions.
  - Deployment.
  - Prisma schema changes.
  - Dependency changes.
  - Replacing the existing individual product surfaces.
allowed_files:
  - .forge/tasks/TASK-0009.yaml
  - .forge/artifacts/TASK-0009/
  - docs/TASKS.md
  - docs/DOGFOODING_LOG.md
  - docs/ARCHITECTURE.md
  - docs/MVP_SCOPE.md
  - README.md
  - app/page.tsx
  - app/dashboard/
