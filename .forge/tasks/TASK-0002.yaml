acceptance_criteria:
  - id: AC-01
    description: A minimal Next.js App Router shell exists and can be built locally.
  - id: AC-02
    description: TypeScript, styling, and base layout configuration are present and documented.
  - id: AC-03
    description: Root package scripts provide reproducible install, lint/typecheck/build or equivalent bootstrap checks.
  - id: AC-04
    description: ForgePilot verification covers both Forge contract validation and application bootstrap checks.
  - id: AC-05
    description: GitHub Actions are updated so PRs validate the app bootstrap and Forge contracts.
  - id: AC-06
    description: README explains how to install, verify, and run the app locally.
  - id: AC-07
    description: No product feature modules beyond the base shell are implemented in TASK-0002.
  - id: AC-08
    description: Any Forge workflow friction found during bootstrap is recorded in the dogfooding log.
  - id: AC-09
    description: The task lifecycle artifacts are created and linked correctly.

required_checks:
  - verify
