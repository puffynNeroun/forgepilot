schema_version: 1

id: TASK-0002
title: "Bootstrap Next.js app with CI and base layout"
status: in_progress
workflow: .forge/workflows/feature.yaml

goal: "Bootstrap the ForgePilot Next.js application shell with TypeScript, Tailwind, base routes, root project scripts, and CI checks without implementing product features."

in_scope:
  - Create the initial Next.js App Router application shell.
  - Add TypeScript project configuration for the application.
  - Add Tailwind/global styling foundation.
  - Add a minimal base layout and home page that clearly identify ForgePilot as an early dogfood dashboard.
  - Add root package scripts for local app checks.
  - Update ForgePilot verification commands so project verification covers both Forge contracts and the application bootstrap checks.
  - Add or update GitHub Actions so PRs validate the application bootstrap and Forge contracts.
  - Update README setup instructions for the new app shell.
  - Record any Forge workflow friction discovered during application bootstrap.

out_of_scope:
  - Implementing product dashboard feature logic.
  - Implementing product spec editor.
  - Implementing task lifecycle board.
  - Implementing decision log.
  - Implementing dogfooding log UI.
  - Implementing handoff prompt generator.
  - Implementing release timeline UI.
  - Adding PostgreSQL, Prisma, database schema, migrations, or seed data.
  - Adding authentication, billing, teams, OAuth, GitHub import automation, or AI agent execution.
  - Creating releases or deployments.
  - Modifying completed task contracts or completed task artifacts.
  - Rewriting previous task evidence.
  - Adding unrelated features outside TASK-0002.

