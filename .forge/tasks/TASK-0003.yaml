schema_version: 1

id: TASK-0003
title: "Add database schema for products, tasks, decisions, and releases"
status: proposed
workflow: .forge/workflows/feature.yaml

goal: "Add the first ForgePilot persistence foundation with Prisma, PostgreSQL configuration, database models, seed/demo data direction, and safe verification scripts without implementing product UI features."

in_scope:
  - Add Prisma and PostgreSQL-oriented database foundation.
  - Define the initial data model for ForgePilot MVP entities.
  - Add models for product/workspace-level data, product specs, tasks, decisions, dogfooding entries, releases, and handoff snapshots.
  - Add a Prisma client helper suitable for Next.js development.
  - Add database-related package scripts.
  - Add Docker Compose configuration for local PostgreSQL.
  - Update .env.example with database variables.
  - Add minimal seed/demo data if it can be done safely and reproducibly.
  - Update README and architecture docs with database setup instructions.
  - Keep pnpm verify green without requiring a live database service.
  - Record any Forge workflow friction discovered during database bootstrap.

out_of_scope:
  - Building product dashboard UI.
  - Building product spec editor UI.
  - Building task lifecycle board UI.
  - Building decision log UI.
  - Building dogfooding log UI.
  - Building release timeline UI.
  - Building handoff prompt generator UI.
  - Implementing authentication, teams, billing, OAuth, or multi-tenant SaaS behavior.
  - Implementing GitHub import automation.
  - Implementing AI agent execution.
  - Adding production deployment infrastructure.
  - Running destructive database operations against non-local databases.
  - Creating a release.
  - Modifying completed TASK-0001 or TASK-0002 artifacts.
  - Rewriting previous Git history.

allowed_files:
  - .forge/tasks/TASK-0003.yaml
  - docs/TASKS.md
  - docs/ARCHITECTURE.md
  - docs/MVP_SCOPE.md
  - docs/DOGFOODING_LOG.md
  - README.md
  - .forge/project.yaml
  - .env.example
  - .gitignore
