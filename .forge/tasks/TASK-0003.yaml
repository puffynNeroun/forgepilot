  - .forge/tasks/TASK-0002.yaml
  - .forge/artifacts/TASK-0001/
  - .forge/artifacts/TASK-0002/
  - tools/forge-validator/
  - scripts/operator/
  - app/
  - components/
  - completed task contracts and artifacts

acceptance_criteria:
  - id: AC-01
    description: Prisma is installed and configured for ForgePilot without breaking existing app verification.
  - id: AC-02
    description: A PostgreSQL-backed Prisma schema exists for products, specs, tasks, decisions, dogfooding entries, releases, and handoff snapshots.
  - id: AC-03
    description: Local database setup is documented and supported through Docker Compose.
  - id: AC-04
    description: .env.example documents DATABASE_URL and any required database-related variables without committing secrets.
  - id: AC-05
    description: A reusable Prisma client helper exists for future Next.js server-side usage.
  - id: AC-06
    description: Root package scripts include safe database commands such as db:generate, db:push, and db:seed if implemented.
  - id: AC-07
    description: pnpm verify remains green without requiring a running database service.
  - id: AC-08
    description: Database bootstrap documentation is added to README and architecture docs.
  - id: AC-09
    description: No product UI features or auth/multi-tenant behavior are implemented in TASK-0003.
  - id: AC-10
    description: Any Forge or bootstrap friction is recorded in docs/DOGFOODING_LOG.md.
  - id: AC-11
    description: Planner, Builder, Tester, and Reviewer artifacts are created and linked correctly.

required_checks:
  - verify
